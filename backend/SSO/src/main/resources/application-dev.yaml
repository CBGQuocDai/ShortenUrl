server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 1000
      min-spare: 100

spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 80
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: false
  data:
    redis:
      port: ${REDIS_PORT}
      host: ${REDIS_HOST}
jwt:
  secret: ${JWT_SECRET}
  duration: ${JWT_EXPIRATION}
  issuer: ${JWT_ISSUER}
management:
  endpoints:
    web:
      exposure:
        include: "*"
