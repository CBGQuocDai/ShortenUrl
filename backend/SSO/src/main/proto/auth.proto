syntax = "proto3";

package auth;

option go_package = "github.com/quocdai/go-shorten/pb";
option java_multiple_files = true;
option java_package = "com.backend.auth.grpc";

service AuthService {
    rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    bool valid = 1;
    int64 userId = 2;
    string username = 3;
    string role = 4;
}
